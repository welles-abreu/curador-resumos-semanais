name: Automação Curadoria Semanal (Timeline, TBT e Infográfico)

on:
  # Permite rodar o script manualmente clicando em um botão no GitHub
  workflow_dispatch: 
  
  # Agenda de execução (Cron Job)
  # 11:19 UTC equivale a 08:19 no Horário de Brasília
  # 0 = Domingo, 4 = Quinta-feira, 6 = Sábado
  schedule:
    - cron: '19 11 * * 0,4,6'

# Concede permissão para o bot do GitHub alterar arquivos (necessário para salvar a memória)
permissions:
  contents: write

jobs:
  executar_curadoria:
    runs-on: ubuntu-latest

    steps:
      # 1. Puxa os arquivos do seu repositório para a máquina virtual
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      # 2. Prepara o ambiente com o Python (Atualizado para 3.11)
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instala exatamente as bibliotecas exigidas pelo código
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests google-genai

      # 4. Executa o código Python puxando as chaves secretas do GitHub Secrets
      - name: Executar script de curadoria
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_URN_ID: ${{ secrets.LINKEDIN_URN_ID }}
          SENHA_APP_GMAIL: ${{ secrets.SENHA_APP_GMAIL }}
        run: python curador-resumos-semanais.py

      # 5. Salva os históricos no repositório (para evitar repetição de notícias e imagens)
      - name: Salvar histórico de curadoria (Commit & Push)
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          
          # Garante que os arquivos existam mesmo nas primeiras execuções
          touch historico_noticias.txt
          touch historico_imagens_semanal.txt
          
          # Adiciona os arquivos ao Git
          git add historico_noticias.txt
          git add historico_imagens_semanal.txt
          
          # Faz o commit apenas se houver alterações. Ignora eventuais erros.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Atualizando históricos de curadoria [Actions Bot]" && git push) || true
